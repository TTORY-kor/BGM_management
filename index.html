<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGM 워크스테이션 PRO (Refined Edition)</title>
    <style>
        :root { 
            --primary: #4f46e5; /* 좀 더 차분한 퍼플 */
            --sidebar-bg: #111827; /* 더 짙은 네이비 그레이 */
            --bg: #f3f4f6; /* 약간 더 차분한 배경 */
            --text-main: #1f2937;
            --gray-bar: #9ca3af; /* 요구하신 회색 바 색상 */
            --tag-bg: #e5e7eb; /* 차분한 회색 태그 배경 */
            --tag-text: #4b5563; /* 태그 글자색 */
        }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--text-main); }
        
        /* 사이드바 */
        .sidebar { width: 260px; background: var(--sidebar-bg); color: #f9fafb; padding: 25px; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; border-right: 1px solid #1f2937; }
        .sidebar h2 { font-size: 1.1rem; margin-bottom: 25px; color: white; border-bottom: 1px solid #1f2937; padding-bottom: 15px; font-weight: 800; letter-spacing: -0.05em; }
        .sidebar-section { margin-bottom: 30px; }
        .sidebar-section h3 { font-size: 0.7rem; text-transform: uppercase; color: #4b5563; margin-bottom: 15px; letter-spacing: 0.1em; display: flex; justify-content: space-between; align-items: center; }
        
        .menu-item { padding: 11px 14px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; display: flex; align-items: center; color: #9ca3af; font-weight: 500; }
        .menu-item:hover { background: #1f2937; color: white; }
        .menu-item.active { background: var(--primary); color: white; font-weight: 600; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2); }
        
        .color-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 12px; flex-shrink: 0; }
        .add-btn { font-size: 0.7rem; color: var(--primary); cursor: pointer; border: 1px solid #312e81; padding: 2px 7px; border-radius: 4px; transition: 0.2s; }
        .add-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

        /* 메인 영역 */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #e5e7eb; padding-bottom: 15px; }
        .header h1 { font-size: 1.5rem; font-weight: 800; margin: 0; color: #111827; letter-spacing: -0.03em; }
        
        /* 입력 카드 */
        .input-card { background: white; padding: 25px; border-radius: 16px; border: 1px solid #e5e7eb; margin-bottom: 35px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .input-grid { display: grid; grid-template-columns: 1.5fr 1.5fr 1fr 1fr 90px; gap: 12px; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #d1d5db; font-size: 0.85rem; background: white; outline: none; transition: 0.2s; color: var(--text-main); }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .save-btn { background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 0.85rem; }
        .save-btn:hover { background: #4338ca; transform: translateY(-1px); }
        .save-btn:disabled { background: #9ca3af; cursor: not-allowed; }

        /* 카드 그리드 */
        .bgm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 28px; }
        .bgm-card { background: white; border-radius: 16px; overflow: hidden; border: 1px solid #e5e7eb; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; display: flex; flex-direction: column; }
        .bgm-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        
        /* 🔘 왼쪽 그레이 바 (요청 사항) */
        .card-side-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background-color: var(--gray-bar); z-index: 10; }
        
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; background: #000; margin-left: 6px; /* 바 너비만큼 마진 */ }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .card-body { padding: 20px; padding-left: 26px; /* 바 너비 + 기본 패딩 */ flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-folder { font-size: 0.7rem; font-weight: 700; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
        .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 15px; display: block; color: #111827; line-height: 1.4; }
        
        /* 🔘 깔끔해진 태그 디자인 (요청 사항) */
        .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; }
        .card-tag { font-size: 0.7rem; background-color: var(--tag-bg); color: var(--tag-text); padding: 4px 10px; border-radius: 6px; font-weight: 600; letter-spacing: -0.02em; transition: 0.2s; cursor: pointer; }
        .card-tag:hover { background-color: #d1d5db; color: #111827; }

        .loading { text-align: center; padding: 80px; color: #9ca3af; font-size: 0.9rem; font-weight: 500; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>🎵 BGM Library</h2>
    
    <div class="sidebar-section">
        <h3>General</h3>
        <div class="menu-item active" id="menu-all" onclick="setFilter('전체', 'folder')">🌐 전체 보기</div>
    </div>

    <div class="sidebar-section">
        <h3>Folders <span class="add-btn" onclick="createNewFolder()">+ 추가</span></h3>
        <div id="folderMenu"></div>
    </div>

    <div class="sidebar-section">
        <h3>Tags</h3>
        <div id="tagMenu" style="display: flex; flex-wrap: wrap; gap: 6px; padding: 0 10px;"></div>
    </div>
</div>

<div class="main-content">
    <div class="header">
        <h1 id="viewTitle">전체 목록</h1>
    </div>

    <div class="input-card">
        <div class="input-grid">
            <input type="text" id="inTitle" placeholder="곡 제목 또는 장면 설명">
            <input type="text" id="inUrl" placeholder="유튜브 URL 주소">
            <select id="selTag"><option value="">태그 선택</option></select>
            <select id="selFolder"><option value="기타">폴더 선택</option></select>
            <button class="save-btn" onclick="saveToSheet()">저장</button>
        </div>
    </div>

    <div id="loading" class="loading">구글 시트와 데이터를 동기화하고 있습니다...</div>
    <div id="bgmGrid" class="bgm-grid"></div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwqRkmp_jE5WYDWHHdFWFv9eNVBEpSkemiPEKlxDUW_ZzfZYTygMIbAV36nxH-Sy3s/exec';
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQCL8oO_ZGrgfzsU62QiBleCD8Fd-chR0kYzQC67DD7ENumxN0iTt-l9H134kxmgPt55AbtknAdgWmO/pub?output=csv';

    let allItems = [];
    let currentFilter = { type: 'folder', value: '전체' };

    // 사이드바 전용 고유 색상 점 생성기
    function stringToColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = str.charCodeAt(i) + ((hash << 5) - hash);
        }
        const h = Math.abs(hash % 360);
        return `hsl(${h}, 60%, 50%)`;
    }

    function getYoutubeId(url) {
        if (!url) return null;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.trim().match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    async function saveToSheet() {
        const title = document.getElementById('inTitle').value;
        const url = document.getElementById('inUrl').value;
        const tag = document.getElementById('selTag').value;
        const folder = document.getElementById('selFolder').value;
        const btn = document.querySelector('.save-btn');

        if (!title || !url) return alert("제목과 URL을 입력해주세요!");

        btn.disabled = true;
        btn.innerText = "저장 중";

        try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ title, url, tag, folder }) });
            alert("저장되었습니다! 반영까지 잠시만 기다려주세요.");
            
            // 입력창 초기화
            document.getElementById('inTitle').value = '';
            document.getElementById('inUrl').value = '';
            document.getElementById('selTag').value = '';
            document.getElementById('selFolder').value = '기타';

        } catch (e) {
            alert("저장 중 오류가 발생했습니다.");
        } finally {
            btn.disabled = false;
            btn.innerText = "저장";
        }
    }

    function createNewFolder() {
        const name = prompt("새로운 폴더 이름을 입력하세요:");
        if (name) {
            const selFolder = document.getElementById('selFolder');
            const opt = document.createElement('option');
            opt.value = name; opt.innerHTML = name;
            selFolder.appendChild(opt);
            selFolder.value = name;
            alert(`'${name}' 폴더가 임시 선택되었습니다. 곡을 저장하면 시트에 정식 등록됩니다.`);
        }
    }

    async function loadData() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.split('\n').slice(1);

            allItems = rows.map(row => {
                const cols = row.split(',');
                if (cols.length < 2) return null;
                return {
                    title: cols[0]?.trim(),
                    url: cols[1]?.trim(),
                    tags: cols[2] ? cols[2].split('|').map(t => t.trim()) : [],
                    folder: cols[3]?.trim() || '기타'
                };
            }).filter(i => i && getYoutubeId(i.url));

            renderUI();
            document.getElementById('loading').style.display = 'none';
        } catch (e) {
            document.getElementById('loading').innerText = "데이터를 불러오지 못했습니다.";
        }
    }

    function renderUI() {
        const folders = [...new Set(allItems.map(i => i.folder))].sort();
        const tags = [...new Set(allItems.flatMap(i => i.tags))].filter(t => t).sort();

        // 사이드바 폴더
        document.getElementById('folderMenu').innerHTML = folders.map(f => `
            <div class="menu-item" onclick="setFilter('${f}', 'folder')">
                <div class="color-dot" style="background:${stringToColor(f)}"></div>
                ${f}
            </div>
        `).join('');

        // 사이드바 태그 (세련된 회색 톤)
        document.getElementById('tagMenu').innerHTML = tags.map(t => `
            <span class="card-tag" onclick="setFilter('${t}', 'tag')">#${t}</span>
        `).join('');

        // 입력 선택창
        document.getElementById('selFolder').innerHTML = '<option value="기타">폴더 선택</option>' + folders.map(f => `<option value="${f}">${f}</option>`).join('');
        document.getElementById('selTag').innerHTML = '<option value="">태그 선택</option>' + tags.map(t => `<option value="${t}">${t}</option>`).join('');
        
        renderGrid();
    }

    function setFilter(val, type) {
        currentFilter = { type, value: val };
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
        if(val === '전체') document.getElementById('menu-all').classList.add('active');
        document.getElementById('viewTitle').innerText = val === '전체' ? "전체 목록" : `${type === 'tag' ? '#' : ''}${val}`;
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('bgmGrid');
        let filtered = allItems;
        if (currentFilter.value !== '전체') {
            filtered = (currentFilter.type === 'folder') 
                ? allItems.filter(i => i.folder === currentFilter.value)
                : allItems.filter(i => i.tags.includes(currentFilter.value));
        }

        grid.innerHTML = filtered.map(item => `
            <div class="bgm-card">
                <div class="card-side-bar"></div> <div class="video-box"><iframe src="https://www.youtube.com/embed/${getYoutubeId(item.url)}" allowfullscreen></iframe></div>
                <div class="card-body">
                    <div>
                        <div class="card-folder">${item.folder}</div>
                        <strong class="card-title">${item.title}</strong>
                    </div>
                    <div class="card-tags">
                        ${item.tags.map(t => `<span class="card-tag">#${t}</span>`).join('')}
                    </div>
                </div>
            </div>
        `).join('');
    }

    // 10분마다 자동으로 데이터 새로고침
    setInterval(loadData, 600000);

    loadData();
</script>
</body>
</html>
