<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시나리오 BGM 워크스테이션</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 사이드바 (폴더 목록) */
        .sidebar { width: 260px; background: #1e293b; color: white; padding: 20px; display: flex; flex-direction: column; }
        .folder-item { padding: 12px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; transition: 0.2s; }
        .folder-item:hover { background: #334155; }
        .folder-item.active { background: #475569; border-left: 4px solid var(--primary); }
        .color-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; }
        
        /* 메인 영역 */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* 입력창 구역 */
        .input-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 25px; }
        .input-grid { display: grid; grid-template-columns: 2fr 2fr 1fr 100px; gap: 10px; }
        input, select, button { padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .btn-add { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }

        /* BGM 카드 그리드 */
        .bgm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .bgm-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .card-info { padding: 15px; }
        .tag-badge { font-size: 0.75rem; background: #f1f5f9; color: #475569; padding: 2px 8px; border-radius: 4px; margin-right: 5px; }
        
        /* 모달 스타일 */
        .modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:25px; border-radius:15px; box-shadow:0 20px 25px -5px rgba(0,0,0,0.1); z-index:100; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:90; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>📁 폴더</h2>
    <div id="folderList"></div>
    <button onclick="openFolderModal()" style="margin-top:20px; background:#334155; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">+ 폴더 추가</button>
</div>

<div class="main-content">
    <div class="header">
        <h1 id="currentFolderName">폴더를 선택해주세요</h1>
        <button onclick="deleteFolder()" id="delFolderBtn" style="display:none; color: #ff4d4d; border:none; background:none; cursor:pointer;">폴더 삭제</button>
    </div>

    <div class="input-card" id="inputSection" style="display:none;">
        <div class="input-grid">
            <input type="text" id="bgmTitle" placeholder="곡 제목/장면">
            <input type="text" id="bgmUrl" placeholder="유튜브 URL">
            <input type="text" id="bgmTag" placeholder="태그 입력 (엔터)">
            <button class="btn-add" onclick="addBGM()">추가</button>
        </div>
    </div>

    <div id="bgmGrid" class="bgm-grid"></div>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="modal" id="folderModal">
    <h3>새 폴더 생성</h3>
    <input type="text" id="newFolderName" placeholder="폴더 이름" style="width:100%; margin-bottom:10px;">
    <input type="color" id="newFolderColor" value="#4f46e5" style="width:100%; height:40px; margin-bottom:15px;">
    <button onclick="addFolder()" class="btn-add" style="width:100%;">생성하기</button>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('bgm_app_data')) || { folders: [], lastId: 0 };
    let currentFolderId = null;

    // --- 폴더 기능 ---
    function openFolderModal() { 
        document.getElementById('folderModal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }
    function closeModal() { 
        document.getElementById('folderModal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    function addFolder() {
        const name = document.getElementById('newFolderName').value;
        const color = document.getElementById('newFolderColor').value;
        if(!name) return;

        const newFolder = { id: Date.now(), name, color, items: [] };
        data.folders.push(newFolder);
        save();
        renderFolders();
        closeModal();
        document.getElementById('newFolderName').value = '';
    }

    function renderFolders() {
        const list = document.getElementById('folderList');
        list.innerHTML = data.folders.map(f => `
            <div class="folder-item ${currentFolderId === f.id ? 'active' : ''}" onclick="selectFolder(${f.id})">
                <div class="color-dot" style="background:${f.color}"></div>
                ${f.name}
            </div>
        `).join('');
    }

    function selectFolder(id) {
        currentFolderId = id;
        const folder = data.folders.find(f => f.id === id);
        document.getElementById('currentFolderName').innerText = folder.name;
        document.getElementById('inputSection').style.display = 'block';
        document.getElementById('delFolderBtn').style.display = 'block';
        renderFolders();
        renderBgms();
    }

    function deleteFolder() {
        if(confirm("폴더와 내부 BGM이 모두 삭제됩니다. 계속할까요?")) {
            data.folders = data.folders.filter(f => f.id !== currentFolderId);
            currentFolderId = null;
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('delFolderBtn').style.display = 'none';
            document.getElementById('currentFolderName').innerText = "폴더를 선택해주세요";
            save();
            renderFolders();
            renderBgms();
        }
    }

    // --- BGM 기능 ---
    function getYoutubeId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function addBGM() {
        const title = document.getElementById('bgmTitle').value;
        const url = document.getElementById('bgmUrl').value;
        const tag = document.getElementById('bgmTag').value;
        const videoId = getYoutubeId(url);

        if(!title || !videoId) return alert("제목과 올바른 URL을 입력하세요.");

        const folder = data.folders.find(f => f.id === currentFolderId);
        folder.items.push({ id: Date.now(), title, videoId, tag });
        
        save();
        renderBgms();
        document.getElementById('bgmTitle').value = '';
        document.getElementById('bgmUrl').value = '';
        document.getElementById('bgmTag').value = '';
    }

    function deleteBGM(id) {
        const folder = data.folders.find(f => f.id === currentFolderId);
        folder.items = folder.items.filter(item => item.id !== id);
        save();
        renderBgms();
    }

    function renderBgms() {
        const grid = document.getElementById('bgmGrid');
        grid.innerHTML = '';
        if(!currentFolderId) return;

        const folder = data.folders.find(f => f.id === currentFolderId);
        grid.innerHTML = folder.items.map(item => `
            <div class="bgm-card">
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/${item.videoId}" allowfullscreen></iframe>
                </div>
                <div class="card-info">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div>
                            <div style="font-weight:bold; margin-bottom:5px;">${item.title}</div>
                            ${item.tag ? `<span class="tag-badge"># ${item.tag}</span>` : ''}
                        </div>
                        <button onclick="deleteBGM(${item.id})" style="border:none; background:none; color:#ccc; cursor:pointer;">&times;</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function save() {
        localStorage.setItem('bgm_app_data', JSON.stringify(data));
    }

    renderFolders();
</script>
</body>
</html>
