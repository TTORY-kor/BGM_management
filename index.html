<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGM 워크스테이션 PRO</title>
    <style>
        :root { 
            --primary: #6366f1; 
            --sidebar-bg: #2d3436; /* 🔘 요청하신 스타일로 사이드바 색상 변경 (짙은 그레이/차콜) */
            --main-bg: #e5e7eb; 
            --card-bg: #ffffff;
            --text-main: #111827;
            --danger: #ef4444; /* 삭제 버튼 색상 */
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--main-bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 사이드바 */
        .sidebar { width: 260px; background: var(--sidebar-bg); color: #dfe6e9; padding: 25px; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
        .sidebar h2 { font-size: 1.1rem; margin-bottom: 25px; color: white; border-bottom: 1px solid #636e72; padding-bottom: 15px; font-weight: 800; }
        .sidebar-section { margin-bottom: 30px; }
        .sidebar-section h3 { font-size: 0.7rem; text-transform: uppercase; color: #b2bec3; margin-bottom: 15px; letter-spacing: 0.1em; display: flex; justify-content: space-between; }
        
        .menu-item { padding: 10px 14px; margin-bottom: 4px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; display: flex; align-items: center; color: #b2bec3; }
        .menu-item:hover { background: #4b5563; color: white; }
        .menu-item.active { background: var(--primary); color: white; font-weight: 600; }
        .menu-item.add-btn-main { background: #4b5563; color: #fff; margin-top: 10px; border: 1px dashed #636e72; justify-content: center; }

        /* 메인 영역 */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 40px; background: var(--main-bg); }
        
        /* 팝업 입력창 */
        #inputOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
        .input-card { background: white; padding: 30px; border-radius: 16px; width: 450px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .input-field { display: flex; flex-direction: column; gap: 12px; }
        .input-field input, .input-field select { padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; }

        /* 카드 그리드 및 카드 */
        .bgm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .bgm-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #d1d5db; transition: 0.3s; }
        .card-side-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; z-index: 10; }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; background: #000; margin-left: 6px; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .card-body { padding: 18px; padding-left: 24px; position: relative; }
        .card-folder { font-size: 0.7rem; font-weight: bold; margin-bottom: 4px; }
        .card-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 10px; display: block; color: #111827; }
        .card-tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; font-weight: 600; margin-right: 4px; }

        /* 🔘 수정/삭제 버튼 */
        .card-actions { margin-top: 15px; display: flex; gap: 8px; border-top: 1px solid #f3f4f6; padding-top: 12px; }
        .action-btn { font-size: 0.75rem; border: none; background: #f3f4f6; padding: 5px 10px; border-radius: 4px; cursor: pointer; color: #6b7280; font-weight: 600; }
        .action-btn:hover { background: #e5e7eb; color: #111827; }
        .btn-delete:hover { background: var(--danger); color: white; }
    </style>
</head>
<body>

<div id="inputOverlay">
    <div class="input-card">
        <h3 id="formTitle">➕ 새로운 BGM 추가</h3>
        <input type="hidden" id="editRowId"> <div class="input-field">
            <input type="text" id="inTitle" placeholder="곡 제목 / 장면 설명">
            <input type="text" id="inUrl" placeholder="유튜브 URL 주소">
            <input type="text" id="inTag" placeholder="태그 (예: 긴장|슬픔)">
            <input type="text" id="inFolder" placeholder="폴더명">
            <div style="display: flex; gap: 8px;">
                <button class="action-btn" style="flex:1; background:var(--primary); color:white;" onclick="saveToSheet()">저장하기</button>
                <button class="action-btn" style="flex:1;" onclick="toggleInput()">취소</button>
            </div>
        </div>
    </div>
</div>

<div class="sidebar">
    <h2>🎵 BGM Library</h2>
    <div class="sidebar-section">
        <h3>Menu</h3>
        <div class="menu-item active" id="menu-all" onclick="setFilter('전체', 'folder')">🌐 전체 보기</div>
        <div class="menu-item add-btn-main" onclick="openAddForm()">➕ BGM 추가하기</div>
    </div>
    <div class="sidebar-section">
        <h3>Folders</h3>
        <div id="folderMenu"></div>
    </div>
    <div class="sidebar-section">
        <h3>Tags</h3>
        <div id="tagMenu" style="display: flex; flex-wrap: wrap; gap: 5px;"></div>
    </div>
</div>

<div class="main-content">
    <div class="header"><h1 id="viewTitle">전체 목록</h1></div>
    <div id="loading" style="text-align: center; margin-top: 50px;">데이터 동기화 중...</div>
    <div id="bgmGrid" class="bgm-grid"></div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwqRkmp_jE5WYDWHHdFWFv9eNVBEpSkemiPEKlxDUW_ZzfZYTygMIbAV36nxH-Sy3s/exec';
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQCL8oO_ZGrgfzsU62QiBleCD8Fd-chR0kYzQC67DD7ENumxN0iTt-l9H134kxmgPt55AbtknAdgWmO/pub?output=csv';

    let allItems = [];
    let currentFilter = { type: 'folder', value: '전체' };

    function toggleInput() {
        const overlay = document.getElementById('inputOverlay');
        overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
    }

    function openAddForm() {
        document.getElementById('formTitle').innerText = "➕ 새로운 BGM 추가";
        document.getElementById('editRowId').value = "";
        document.getElementById('inTitle').value = "";
        document.getElementById('inUrl').value = "";
        document.getElementById('inTag').value = "";
        document.getElementById('inFolder').value = "";
        toggleInput();
    }

    // 색상 생성 함수들 생략(기존과 동일)
    function stringToColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
        const h = Math.abs(hash % 360);
        return `hsl(${h}, 70%, 45%)`;
    }
    function stringToLightColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
        const h = Math.abs(hash % 360);
        return `hsl(${h}, 80%, 93%)`;
    }

    async function saveToSheet() {
        const title = document.getElementById('inTitle').value;
        const url = document.getElementById('inUrl').value;
        const tag = document.getElementById('inTag').value;
        const folder = document.getElementById('inFolder').value;
        const rowId = document.getElementById('editRowId').value;

        if (!title || !url) return alert("필수 정보를 입력해주세요.");

        try {
            // 수정 시에는 rowId를 포함해서 전송, 추가 시에는 없이 전송
            const payload = { title, url, tag, folder, rowId, action: rowId ? "edit" : "add" };
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("처리되었습니다! 잠시 후 데이터가 갱신됩니다.");
            location.reload();
        } catch (e) { alert("서버 통신 오류"); }
    }

    async function deleteItem(rowId) {
        if (!confirm("정말 이 곡을 삭제하시겠습니까?")) return;
        try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "delete", rowId: rowId }) });
            alert("삭제 요청을 보냈습니다.");
            location.reload();
        } catch (e) { alert("삭제 오류"); }
    }

    function editItem(index) {
        const item = allItems[index];
        document.getElementById('formTitle').innerText = "✏️ 곡 정보 수정";
        document.getElementById('editRowId').value = index + 2; // 시트의 실제 행 번호 (헤더 제외 2행부터 시작)
        document.getElementById('inTitle').value = item.title;
        document.getElementById('inUrl').value = item.url;
        document.getElementById('inTag').value = item.tags.join('|');
        document.getElementById('inFolder').value = item.folder;
        toggleInput();
    }

    async function loadData() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            allItems = rows.map((row, idx) => {
                const cols = row.split(',');
                if (cols.length < 2) return null;
                return { title: cols[0], url: cols[1], tags: cols[2] ? cols[2].split('|').map(t => t.trim()) : [], folder: cols[3]?.trim() || '기타', rowId: idx + 2 };
            }).filter(i => i && i.url);
            renderUI();
            document.getElementById('loading').style.display = 'none';
        } catch (e) { }
    }

    function getYoutubeId(url) {
        if (!url) return null;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.trim().match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function renderUI() {
        const folders = [...new Set(allItems.map(i => i.folder))].sort();
        const tags = [...new Set(allItems.flatMap(i => i.tags))].filter(t => t).sort();

        document.getElementById('folderMenu').innerHTML = folders.map(f => `<div class="menu-item" onclick="setFilter('${f}', 'folder')"><div class="color-dot" style="background:${stringToColor(f)}"></div>${f}</div>`).join('');
        document.getElementById('tagMenu').innerHTML = tags.map(t => `<span class="card-tag" style="background:${stringToLightColor(t)}; color:${stringToColor(t)}; cursor:pointer;" onclick="setFilter('${t}', 'tag')">#${t}</span>`).join('');
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('bgmGrid');
        let filtered = currentFilter.value === '전체' ? allItems : (currentFilter.type === 'folder' ? allItems.filter(i => i.folder === currentFilter.value) : allItems.filter(i => i.tags.includes(currentFilter.value)));

        grid.innerHTML = filtered.map((item, idx) => `
            <div class="bgm-card">
                <div class="card-side-bar" style="background:${stringToColor(item.folder)}"></div>
                <div class="video-box"><iframe src="https://www.youtube.com/embed/${getYoutubeId(item.url)}" allowfullscreen></iframe></div>
                <div class="card-body">
                    <div class="card-folder" style="color:${stringToColor(item.folder)}">${item.folder}</div>
                    <strong class="card-title">${item.title}</strong>
                    <div class="card-tags">${item.tags.map(t => `<span class="card-tag" style="background:${stringToLightColor(t)}; color:${stringToColor(t)};">#${t}</span>`).join('')}</div>
                    <div class="card-actions">
                        <button class="action-btn" onclick="editItem(${allItems.indexOf(item)})">수정</button>
                        <button class="action-btn btn-delete" onclick="deleteItem(${item.rowId})">삭제</button>
                    </div>
                </div>
            </div>
        `).join('');
    }
    loadData();
</script>
</body>
</html>
