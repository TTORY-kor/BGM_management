<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BGM Studio PRO</title>
<style>
:root{
  --bg:#f4f7fc; --surface:#fff; --border:#dbe6f5;
  --text:#1a2b4c; --muted:#6b86a8;
  --accent:#2563eb; --accent-soft:#e8f0ff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:var(--bg);color:var(--text)}

header{padding:16px 20px;background:#fff;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
header h1{font-size:18px}
button{cursor:pointer;border:0;border-radius:6px;padding:6px 10px;background:var(--accent);color:#fff}

.container{padding:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}

.card{
  background:#fff;border:1px solid var(--border);
  border-radius:10px;overflow:hidden;
  height:200px;display:flex;flex-direction:column;
  cursor:pointer;
}
.card:hover{box-shadow:0 6px 16px rgba(0,0,0,.1)}

.thumb{height:110px;background:#000}
.thumb img{width:100%;height:100%;object-fit:cover}

.card-body{padding:8px;display:flex;flex-direction:column;gap:4px;flex:1}
.title{font-size:13px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.folder{font-size:11px;color:var(--accent)}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:10px;padding:2px 6px;border-radius:999px}

.player{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;border-top:1px solid var(--border);
  padding:10px;display:flex;align-items:center;gap:10px;
}
.player iframe{width:120px;height:70px}
.controls button{background:var(--accent-soft);color:var(--accent)}

</style>
</head>
<body>

<header>
  <h1>BGM Studio</h1>
  <button onclick="openForm()">+ 추가</button>
</header>

<div class="container">
  <div class="grid" id="grid"></div>
</div>

<div class="player" id="playerBar" style="display:none">
  <iframe id="playerFrame"></iframe>
  <div class="controls">
    <button onclick="prev()">◀</button>
    <button onclick="next()">▶</button>
    <button onclick="toggleLoop()">🔁</button>
  </div>
</div>

<script>
const API_URL = "YOUR_APPS_SCRIPT_URL";

let list=[];
let currentIndex=0;
let loop=false;

const tagColors={
  "긴장":"#ff6b6b",
  "몽환":"#a78bfa"
};

function getYoutubeId(url){
  const m=url.match(/(?:v=|\.be\/)([^&]+)/);
  return m?m[1]:null;
}

function thumb(id){
  return `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
}

function play(index){
  currentIndex=index;
  const id=getYoutubeId(list[index].url);
  document.getElementById("playerFrame").src=`https://www.youtube.com/embed/${id}?autoplay=1`;
  document.getElementById("playerBar").style.display="flex";
}

function next(){
  currentIndex++;
  if(currentIndex>=list.length){
    if(loop) currentIndex=0;
    else return;
  }
  play(currentIndex);
}

function prev(){
  currentIndex--;
  if(currentIndex<0){
    if(loop) currentIndex=list.length-1;
    else return;
  }
  play(currentIndex);
}

function toggleLoop(){
  loop=!loop;
}

function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  list.forEach((item,i)=>{
    const id=getYoutubeId(item.url);
    const div=document.createElement("div");
    div.className="card";
    div.onclick=()=>play(i);

    const tags=(item.tags||[]).map(t=>{
      const c=tagColors[t]||"#ddd";
      return `<span class="tag" style="background:${c}">${t}</span>`;
    }).join("");

    div.innerHTML=`
      <div class="thumb"><img src="${thumb(id)}"/></div>
      <div class="card-body">
        <div class="title">${item.title}</div>
        <div class="folder">${item.folder||""}</div>
        <div class="tags">${tags}</div>
      </div>
    `;
    grid.appendChild(div);
  });
}

async function load(){
  const res=await fetch(API_URL);
  list=await res.json();
  render();
}

async function fetchTitle(url){
  const res=await fetch(`https://www.youtube.com/oembed?url=${url}&format=json`);
  const data=await res.json();
  return data.title;
}

async function openForm(){
  const url=prompt("유튜브 링크");
  if(!url)return;
  const title=await fetchTitle(url);
  const folder=prompt("폴더","");
  const tag=prompt("태그 (/)","");

  await fetch(API_URL,{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      action:"add",
      title,url,folder,tag
    })
  });

  load();
}

load();
</script>

</body>
</html>
