<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시나리오 BGM 플레이어</title>
    <style>
        :root { --primary-color: #6366f1; --bg-color: #f1f5f9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        /* 입력부 스타일 */
        .input-group { display: grid; grid-template-columns: 1fr 1fr 120px; gap: 10px; margin-bottom: 30px; }
        input, select, button { padding: 12px; border-radius: 10px; border: 1px solid #ddd; }
        .add-btn { background: var(--primary-color); color: white; border: none; cursor: pointer; grid-column: span 3; font-weight: bold; }

        /* 리스트 및 카드 스타일 */
        .bgm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .bgm-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 15px; overflow: hidden; display: flex; flex-direction: column; }
        
        /* 유튜브 플레이어 영역 */
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .card-content { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .bgm-tag { font-size: 0.7rem; background: #ede9fe; color: #6366f1; padding: 3px 8px; border-radius: 5px; }
        .delete-btn { background: none; border: none; color: #ff4d4d; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center;">🎬 BGM Scenario Player</h1>

    <div class="input-group">
        <input type="text" id="bgmTitle" placeholder="장면 설명 (예: 추격전)">
        <input type="text" id="bgmUrl" placeholder="유튜브 주소 복사/붙여넣기">
        <select id="bgmTag">
            <option value="긴박">🚨 긴박</option>
            <option value="감동">🥺 감동</option>
            <option value="미스터리">🔍 미스터리</option>
            <option value="평온">☕ 평온</option>
        </select>
        <button class="add-btn" onclick="addBGM()">라이브러리에 추가</button>
    </div>

    <div id="bgmGrid" class="bgm-grid"></div>
</div>

<script>
    let bgms = JSON.parse(localStorage.getItem('myBgms')) || [];

    // 유튜브 URL에서 영상 ID만 추출하는 함수
    function getYoutubeId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function addBGM() {
        const title = document.getElementById('bgmTitle').value;
        const url = document.getElementById('bgmUrl').value;
        const tag = document.getElementById('bgmTag').value;
        const videoId = getYoutubeId(url);

        if(!title || !videoId) return alert("올바른 유튜브 주소를 입력해주세요!");

        bgms.push({ id: Date.now(), title, videoId, tag });
        saveAndRender();
        document.getElementById('bgmTitle').value = '';
        document.getElementById('bgmUrl').value = '';
    }

    function deleteBGM(id) {
        if(confirm("이 BGM을 삭제할까요?")) {
            bgms = bgms.filter(b => b.id !== id);
            saveAndRender();
        }
    }

    function saveAndRender() {
        localStorage.setItem('myBgms', JSON.stringify(bgms));
        render();
    }

    function render() {
        const grid = document.getElementById('bgmGrid');
        grid.innerHTML = bgms.map(bgm => `
            <div class="bgm-card">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/${bgm.videoId}" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen></iframe>
                </div>
                <div class="card-content">
                    <div>
                        <strong style="display:block; margin-bottom:5px;">${bgm.title}</strong>
                        <span class="bgm-tag">${bgm.tag}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteBGM(${bgm.id})">삭제</button>
                </div>
            </div>
        `).join('');
    }

    render();
</script>

</body>
</html>
