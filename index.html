<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGM 워크스테이션 PRO (Color Edition)</title>
    <style>
        :root { --primary: #6366f1; --sidebar-bg: #0f172a; --bg: #f8fafc; --text-main: #1e293b; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--text-main); }
        
        /* 사이드바 */
        .sidebar { width: 260px; background: var(--sidebar-bg); color: #f8fafc; padding: 25px; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 25px; color: white; border-bottom: 1px solid #1e293b; padding-bottom: 15px; }
        .sidebar-section { margin-bottom: 25px; }
        .sidebar-section h3 { font-size: 0.75rem; text-transform: uppercase; color: #64748b; margin-bottom: 12px; letter-spacing: 0.05em; display: flex; justify-content: space-between; align-items: center; }
        
        .menu-item { padding: 10px 12px; margin-bottom: 4px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; display: flex; align-items: center; color: #94a3b8; }
        .menu-item:hover { background: #1e293b; color: white; }
        .menu-item.active { background: #334155; color: white; font-weight: 600; box-shadow: inset 4px 0 0 var(--primary); }
        
        .color-circle { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; }
        .add-btn { font-size: 0.7rem; color: var(--primary); cursor: pointer; border: 1px solid var(--primary); padding: 2px 6px; border-radius: 4px; }

        /* 메인 영역 */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 35px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        /* 입력 카드 */
        .input-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 30px; }
        .input-grid { display: grid; grid-template-columns: 1.5fr 1.5fr 1fr 1fr 80px; gap: 10px; }
        input, select { padding: 10px; border-radius: 6px; border: 1px solid #e2e8f0; font-size: 0.85rem; background: white; outline: none; }
        input:focus, select:focus { border-color: var(--primary); }
        .save-btn { background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .save-btn:hover { background: #4f46e5; }

        /* 카드 그리드 */
        .bgm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        .bgm-card { background: white; border-radius: 16px; overflow: hidden; border: 1px solid #e2e8f0; transition: 0.3s; position: relative; }
        .bgm-card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px -5px rgba(0,0,0,0.1); }
        
        /* 카드 상단 폴더 색상 바 */
        .folder-bar { height: 6px; width: 100%; }
        
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .card-body { padding: 18px; }
        .card-folder { font-size: 0.75rem; font-weight: bold; margin-bottom: 6px; }
        .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 12px; display: block; color: #0f172a; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .card-tag { font-size: 0.7rem; padding: 3px 8px; border-radius: 6px; font-weight: 500; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>🎵 BGM Library</h2>
    
    <div class="sidebar-section">
        <h3>General</h3>
        <div class="menu-item active" id="menu-all" onclick="setFilter('전체', 'folder')">🌐 전체 보기</div>
    </div>

    <div class="sidebar-section">
        <h3>Folders <span class="add-btn" onclick="createNewFolder()">+ 추가</span></h3>
        <div id="folderMenu"></div>
    </div>

    <div class="sidebar-section">
        <h3>Tags</h3>
        <div id="tagMenu" style="display: flex; flex-wrap: wrap; gap: 6px;"></div>
    </div>
</div>

<div class="main-content">
    <div class="header">
        <h1 id="viewTitle">전체 목록</h1>
    </div>

    <div class="input-card">
        <div class="input-grid">
            <input type="text" id="inTitle" placeholder="곡 제목/장면 설명">
            <input type="text" id="inUrl" placeholder="유튜브 URL 주소">
            <select id="selTag"><option value="">태그 선택</option></select>
            <select id="selFolder"><option value="기타">폴더 선택</option></select>
            <button class="save-btn" onclick="saveToSheet()">저장</button>
        </div>
    </div>

    <div id="loading" style="text-align: center; margin-top: 50px; color: #94a3b8;">데이터를 동기화하고 있습니다...</div>
    <div id="bgmGrid" class="bgm-grid"></div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwqRkmp_jE5WYDWHHdFWFv9eNVBEpSkemiPEKlxDUW_ZzfZYTygMIbAV36nxH-Sy3s/exec';
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQCL8oO_ZGrgfzsU62QiBleCD8Fd-chR0kYzQC67DD7ENumxN0iTt-l9H134kxmgPt55AbtknAdgWmO/pub?output=csv';

    let allItems = [];
    let currentFilter = { type: 'folder', value: '전체' };

    // 🎨 텍스트 기반 고유 색상 생성기 (폴더/태그별로 일정한 색상 부여)
    function stringToColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = str.charCodeAt(i) + ((hash << 5) - hash);
        }
        const h = Math.abs(hash % 360);
        return `hsl(${h}, 70%, 45%)`; // 어두운 배경용 선명한 색
    }

    function stringToLightColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = str.charCodeAt(i) + ((hash << 5) - hash);
        }
        const h = Math.abs(hash % 360);
        return `hsl(${h}, 80%, 95%)`; // 태그 배경용 연한 색
    }

    function getYoutubeId(url) {
        if (!url) return null;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.trim().match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    async function saveToSheet() {
        const title = document.getElementById('inTitle').value;
        const url = document.getElementById('inUrl').value;
        const tag = document.getElementById('selTag').value;
        const folder = document.getElementById('selFolder').value;
        const btn = document.querySelector('.save-btn');

        if (!title || !url) return alert("제목과 URL을 입력해주세요!");

        btn.disabled = true;
        btn.innerText = "저장 중";

        try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ title, url, tag, folder }) });
            alert("구글 시트에 저장되었습니다!");
            location.reload();
        } catch (e) {
            alert("저장 중 오류가 발생했습니다.");
            btn.disabled = false;
            btn.innerText = "저장";
        }
    }

    function createNewFolder() {
        const name = prompt("새로운 폴더 이름을 입력하세요:");
        if (name) {
            const selFolder = document.getElementById('selFolder');
            const opt = document.createElement('option');
            opt.value = name; opt.innerHTML = name;
            selFolder.appendChild(opt);
            selFolder.value = name;
            alert(`'${name}' 폴더가 선택되었습니다. 곡을 저장하면 시트에 등록됩니다.`);
        }
    }

    async function loadData() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.split('\n').slice(1);

            allItems = rows.map(row => {
                const cols = row.split(',');
                if (cols.length < 2) return null;
                return {
                    title: cols[0]?.trim(),
                    url: cols[1]?.trim(),
                    tags: cols[2] ? cols[2].split('|').map(t => t.trim()) : [],
                    folder: cols[3]?.trim() || '기타'
                };
            }).filter(i => i && getYoutubeId(i.url));

            renderUI();
            document.getElementById('loading').style.display = 'none';
        } catch (e) {
            document.getElementById('loading').innerText = "데이터를 불러오지 못했습니다.";
        }
    }

    function renderUI() {
        const folders = [...new Set(allItems.map(i => i.folder))];
        const tags = [...new Set(allItems.flatMap(i => i.tags))].filter(t => t);

        // 사이드바 폴더
        document.getElementById('folderMenu').innerHTML = folders.map(f => `
            <div class="menu-item" onclick="setFilter('${f}', 'folder')">
                <div class="color-circle" style="background:${stringToColor(f)}"></div>
                ${f}
            </div>
        `).join('');

        // 사이드바 태그
        document.getElementById('tagMenu').innerHTML = tags.map(t => `
            <span class="tag-badge" style="background:${stringToLightColor(t)}; color:${stringToColor(t)}; border:1px solid ${stringToColor(t)}33;" onclick="setFilter('${t}', 'tag')">#${t}</span>
        `).join('');

        // 입력 선택창
        document.getElementById('selFolder').innerHTML = '<option value="기타">폴더 선택</option>' + folders.map(f => `<option value="${f}">${f}</option>`).join('');
        document.getElementById('selTag').innerHTML = '<option value="">태그 선택</option>' + tags.map(t => `<option value="${t}">${t}</option>`).join('');
        
        renderGrid();
    }

    function setFilter(val, type) {
        currentFilter = { type, value: val };
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
        if(val === '전체') document.getElementById('menu-all').classList.add('active');
        document.getElementById('viewTitle').innerText = val === '전체' ? "전체 목록" : val;
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('bgmGrid');
        let filtered = allItems;
        if (currentFilter.value !== '전체') {
            filtered = (currentFilter.type === 'folder') 
                ? allItems.filter(i => i.folder === currentFilter.value)
                : allItems.filter(i => i.tags.includes(currentFilter.value));
        }

        grid.innerHTML = filtered.map(item => {
            const fColor = stringToColor(item.folder);
            return `
                <div class="bgm-card">
                    <div class="folder-bar" style="background:${fColor}"></div>
                    <div class="video-box"><iframe src="https://www.youtube.com/embed/${getYoutubeId(item.url)}" allowfullscreen></iframe></div>
                    <div class="card-body">
                        <div class="card-folder" style="color:${fColor}">${item.folder}</div>
                        <strong class="card-title">${item.title}</strong>
                        <div class="card-tags">
                            ${item.tags.map(t => `
                                <span class="card-tag" style="background:${stringToLightColor(t)}; color:${stringToColor(t)};">#${t}</span>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    loadData();
</script>
</body>
</html>
